server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
        - name: RequestSize
          args:
            maxSize: 10MB
      routes:
        - id: identity-auth
          uri: http://identity-service:8081
          predicates:
            - Path=/api/auth/**
          filters:
            - RemoveRequestHeader=Authorization

        - id: identity-service
          uri: http://identity-service:8081
          predicates:
            - Path=/api/identity/**

        - id: academic-service
          uri: http://academic-service:8082
          predicates:
            - Path=/api/academic/**

        - id: profile-service
          uri: http://profile-service:8083
          predicates:
            - Path=/api/profile/**

        - id: evaluation-service
          uri: http://evaluation-service:8084
          predicates:
            - Path=/api/evaluation/**

        - id: support-service
          uri: http://support-service:8085
          predicates:
            - Path=/api/support/**

        - id: innovation-service
          uri: http://innovation-service:8086
          predicates:
            - Path=/api/innovation/**

        - id: report-service
          uri: http://report-service:8087
          predicates:
            - Path=/api/reports/**

eureka:
  client:
    enabled: false

fineflow:
  jwt:
    secret: ${JWT_SECRET:dGVzdC1zZWNyZXQta2V5LWZvci1kZXYtMjU2LWJpdHM=}

resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
        slowCallRateThreshold: 100
        slowCallDurationThreshold: 2s
    instances:
      default:
        baseConfig: default
  timelimiter:
    configs:
      default:
        timeoutDuration: 5s
        cancelRunningFuture: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,gateway
  endpoint:
    health:
      show-details: always
