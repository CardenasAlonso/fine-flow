server:
  port: 8888

spring:
  application:
    name: config-server
  cloud:
    config:
      server:
        composite:
          - type: native
            search-locations: classpath:/config-repo,file:./config-repo
  security:
    user:
      name: ${CONFIG_USER:admin}
      password: ${CONFIG_PASSWORD:secret}

management:
  endpoints:
    web:
      exposure:
        include: health,info,refresh
