server:
  port: 8888

spring:
  application:
    name: config-server
  cloud:
    config:
      server:
        git:
          uri: ${CONFIG_REPO_URI:classpath:/config-repo}
          default-label: main
          search-paths: "'{application}'"
          clone-on-start: true
  security:
    user:
      name: ${CONFIG_USER:admin}
      password: ${CONFIG_PASSWORD:secret}

management:
  endpoints:
    web:
      exposure:
        include: health,info,refresh
